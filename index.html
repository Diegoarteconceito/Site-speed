<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Car Veículos | Jales - SP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #D0121A; --black: #0A0A0A; --dark: #111111; --dark2: #1A1A1A; --gray: #2C2C2C; --silver: #9CA3AF; --white: #F9FAFB;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Barlow', sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; }

  nav { position: fixed; top:0; left:0; right:0; z-index:100; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 70px; background: rgba(10,10,10,0.95); border-bottom: 1px solid rgba(208,18,26,0.3); }
  .nav-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 900; text-transform: uppercase; }
  .nav-logo span { color: var(--red); }

  #hero { min-height: 70vh; display: flex; flex-direction: column; justify-content: center; padding: 100px 5% 40px; }
  .hero-badge { background: rgba(208,18,26,0.15); border: 1px solid var(--red); color: var(--red); padding: 0.3rem 0.8rem; font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; width: fit-content; margin-bottom: 1rem; }
  .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(3.2rem, 10vw, 6.5rem); font-weight: 900; line-height: 0.9; text-transform: uppercase; }
  .hero-title .red { color: var(--red); display: block; }
  .hero-title .italic { font-style: italic; font-weight: 300; display: block; }

  section { padding: 60px 5%; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 30px; border-left: 5px solid var(--red); padding-left: 15px; }

  /* GRADE DE VEÍCULOS - 4 POR LINHA NO DESKTOP */
  .grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
    gap: 15px; 
  }
  
  .card { background: var(--dark2); border: 1px solid var(--gray); border-radius: 4px; overflow: hidden; transition: 0.3s; position: relative; }
  .card:hover { border-color: var(--red); transform: translateY(-5px); }
  
  .card-img { width: 100%; aspect-ratio: 4/3; background: #222; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
  .card:hover .card-img img { scale: 1.1; }

  .card-content { padding: 15px; }
  .card-model { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; height: 40px; overflow: hidden; }
  .card-info { font-size: 0.8rem; color: var(--silver); margin-bottom: 10px; }
  .price { color: var(--red); font-size: 1.5rem; font-weight: 900; font-family: 'Barlow Condensed'; margin-bottom: 12px; }
  
  .btn-consult { display: block; background: var(--red); color: white; text-align: center; padding: 10px; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; border-radius: 2px; }

  .tag { position: absolute; top: 10px; right: 10px; background: var(--red); color: white; font-size: 0.6rem; padding: 2px 6px; font-weight: 700; border-radius: 2px; z-index: 10; }

  /* MAPA */
  .map-container { width: 100%; height: 350px; border: 1px solid var(--gray); }
  .map-container iframe { width: 100%; height: 100%; border:0; filter: grayscale(1) invert(0.9); }

  .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Speed <span>Car</span></div>
</nav>

<section id="hero">
  <div class="hero-badge">JALES – SP · DESDE 2010</div>
  <h1 class="hero-title">
    <span>SEU PRÓXIMO</span>
    <span class="red">VEÍCULO</span>
    <span class="italic">ESTÁ AQUI.</span>
  </h1>
</section>

<section id="estoque">
  <h2 class="section-title">Estoque Atualizado</h2>
  <div class="grid">
    <script>
      const carros = [
        { nome: "Chevrolet Tracker Premier", ano: "2024", preco: "139.900", img: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=400" },
        { nome: "Toyota Corolla XEi", ano: "2023", preco: "152.000", img: "https://images.unsplash.com/photo-1621007947382-bb3c3994e3fb?auto=format&fit=crop&q=80&w=400" },
        { nome: "Jeep Compass Longitude", ano: "2022", preco: "148.900", img: "https://images.unsplash.com/photo-1539101102904-74e14620e43b?auto=format&fit=crop&q=80&w=400" },
        { nome: "VW Virtus Highline", ano: "2021", preco: "92.500", img: "https://images.unsplash.com/photo-1541899481282-d53bffe3c15d?auto=format&fit=crop&q=80&w=400" },
        { nome: "Honda Civic Touring", ano: "2020", preco: "135.000", img: "https://images.unsplash.com/photo-1594502184342-2e12f877aa73?auto=format&fit=crop&q=80&w=400" },
        { nome: "Fiat Toro Ultra", ano: "2024", preco: "189.900", img: "https://images.unsplash.com/photo-1606016159991-fed45ac7bd8d?auto=format&fit=crop&q=80&w=400" },
        { nome: "Hyundai Creta Ultimate", ano: "2023", preco: "144.000", img: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&q=80&w=400" },
        { nome: "Ford Ranger XLT", ano: "2022", preco: "215.000", img: "https://images.unsplash.com/photo-1533591380348-14193f1de18f?auto=format&fit=crop&q=80&w=400" },
        { nome: "Nissan Kicks Exclusive", ano: "2024", preco: "128.500", img: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?auto=format&fit=crop&q=80&w=400" },
        { nome: "BMW 320i M Sport", ano: "2021", preco: "245.000", img: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=400" },
        { nome: "RAM 2500 Laramie", ano: "2022", preco: "410.000", img: "https://images.unsplash.com/photo-1567818735868-e71b99932e29?auto=format&fit=crop&q=80&w=400" },
        { nome: "Mitsubishi L200 Triton", ano: "2023", preco: "205.900", img: "https://images.unsplash.com/photo-1532581133552-62758fc048a4?auto=format&fit=crop&q=80&w=400" }
      ];

      carros.forEach(carro => {
        document.write(`
          <div class="card">
            <span class="tag">ESTOQUE</span>
            <div class="card-img"><img src="${carro.img}" alt="${carro.nome}"></div>
            <div class="card-content">
              <div class="card-model">${carro.nome}</div>
              <div class="card-info">${carro.ano} • Automático</div>
              <div class="price">R$ ${carro.preco}</div>
              <a href="https://wa.me/5517997263334?text=Olá, vi o ${carro.nome} no site e gostaria de um orçamento." class="btn-consult">Consultar</a>
            </div>
          </div>
        `);
      });
    </script>
  </div>
</section>

<section id="localizacao" style="background: var(--dark);">
  <h2 class="section-title">Visite-nos</h2>
  <p style="margin-bottom: 20px;">Av. João Amadeu, 3216 – Jales/SP</p>
  <div class="map-container">
    <iframe src="http://googleusercontent.com/maps.google.com/7"></iframe>
  </div>
</section>

</body>
</html>

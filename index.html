<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Car Jales</title>
    <style>
        /* MANTENDO SEU LAYOUT ORIGINAL COM TROCA PARA AMARELO */
        :root { --main-color: #FFD700; --bg-dark: #0a0a0a; --card-bg: #141414; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .car-card { background: var(--card-bg); border-radius: 15px; margin-bottom: 30px; display: flex; flex-wrap: wrap; border: 1px solid #222; overflow: hidden; }
        .car-image { flex: 1; min-width: 300px; position: relative; }
        .car-image img { width: 100%; height: 100%; object-fit: cover; min-height: 250px; }
        .car-details { flex: 1.2; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        
        h2 { color: var(--main-color); margin: 0; font-size: 1.8rem; text-transform: uppercase; }
        .info-row { display: flex; gap: 15px; color: #999; margin: 10px 0; font-size: 0.9rem; }
        
        /* ABA DE FOTOS DENTRO DO CARD */
        .photo-selector { display: flex; gap: 10px; margin: 15px 0; }
        .photo-selector button { background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .photo-selector button:hover { border-color: var(--main-color); color: var(--main-color); }

        .price-tag { font-size: 2rem; font-weight: bold; margin: 20px 0; }
        .price-tag span { color: var(--main-color); font-size: 1.2rem; }

        .btn-action { background: var(--main-color); color: black; text-align: center; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; display: block; }
        
        .map-section { margin-top: 50px; border-radius: 15px; overflow: hidden; height: 400px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; margin: 40px 0;">SPEED CAR <span style="color: var(--main-color)">JALES</span></h1>

    <div class="car-card">

                <div class="photo-selector">
                    <button onclick="document.getElementById('main-tracker').src='https://images.unsplash.com/photo-1606148332571-50da1a0cb95c?q=80&w=1000'">EXTERIOR</button>
                    <button onclick="document.getElementById('main-tracker').src='https://images.unsplash.com/photo-1583121274602-3e2820c69888?q=80&w=1000'">INTERIOR</button>
                    <button onclick="document.getElementById('main-tracker').src='https://images.unsplash.com/photo-1617469767053-d3b508a0d182?q=80&w=1000'">PAINEL</button>
                    <button onclick="document.getElementById('main-tracker').src='https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=1000'">RODAS</button>
                </div>
            </div>
            <div>
                <div class="price-tag"><span>R$</span> 129.900</div>
                <a href="https://wa.me/5517997263334" class="btn-action">Falar com Consultor</a>
            </div>
        </div>
    </div>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Car Jales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #FFD700; --dark-bg: #0f0f0f; --card-bg: #181818; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; }
        header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--accent); }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        /* Layout Original dos Cards */
        .car-card { background: var(--card-bg); border-radius: 12px; margin-bottom: 25px; display: flex; flex-wrap: wrap; overflow: hidden; border: 1px solid #222; }
        .car-img-side { flex: 1; min-width: 300px; position: relative; }
        .car-img-side img { width: 100%; height: 100%; object-fit: cover; min-height: 250px; }
        .car-info-side { flex: 1.2; padding: 25px; min-width: 300px; display: flex; flex-direction: column; justify-content: space-between; }
        
        h3 { color: var(--accent); margin: 0 0 10px 0; font-size: 1.5rem; }
        .specs { display: flex; gap: 15px; font-size: 0.9rem; color: #bbb; margin-bottom: 15px; }
        
        /* Abas de Fotos solicitadas */
        .photo-nav { display: flex; gap: 8px; margin-bottom: 15px; }
        .photo-nav button { background: #333; border: 1px solid #444; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .photo-nav button:hover { border-color: var(--accent); }

        .price { font-size: 1.8rem; font-weight: bold; color: white; margin-bottom: 15px; }
        .price span { color: var(--accent); font-size: 1rem; margin-right: 5px; }

        .btn-consultar { background: var(--accent); color: black; text-align: center; padding: 12px; text-decoration: none; border-radius: 6px; font-weight: bold; text-transform: uppercase; }
        
        .map-wrap { margin-top: 50px; border-radius: 12px; overflow: hidden; height: 350px; border: 1px solid #333; }
    </style>
</head>
<body>

<header>
    <h1>SPEED CAR <span style="color: var(--accent)">JALES</span></h1>
</header>

<div class="container">
    <div class="car-card">
        <div class="car-img-side">
            <img src="https://images.unsplash.com/photo-1606148332571-50da1a0cb95c?q=80&w=800" id="view-tracker">
        </div>
        <div class="car-info-side">
            <div>
                <h3>CHEVROLET TRACKER PREMIER</h3>
                <div class="specs"><span>2024</span><span>Automático</span><span>Turbo</span></div>
                
                <p style="font-size: 0.8rem; color: #888;">VEJA MAIS DETALHES:</p>
                <div class="photo-nav">
                    <button onclick="document.getElementById('view-tracker').src='https://images.unsplash.com/photo-1606148332571-50da1a0cb95c?q=80&w=800'">FORA</button>
                    <button onclick="document.getElementById('view-tracker').src='https://images.unsplash.com/photo-1583121274602-3e2820c69888?q=80&w=800'">DENTRO</button>
                    <button onclick="document.getElementById('view-tracker').src='https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=800'">RODA</button>
                    <button onclick="document.getElementById('view-tracker').src='https://images.unsplash.com/photo-1617469767053-d3b508a0d182?q=80&w=800'">PAINEL</button>
                </div>
            </div>
            <div>
                <div class="price"><span>R$</span> 129.900</div>
                <a href="https://wa.me/5517997263334" class="btn-consultar">Consultar no WhatsApp</a>
            </div>
        </div>
    </div>

    <div class="car-card">
        <div class="car-img-side">
            <img src="https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?q=80&w=800" id="view-virtus">
        </div>
        <div class="car-info-side">
            <div>
                <h3>VW VIRTUS HIGHLINE</h3>
                <div class="specs"><span>2023</span><span>Automático</span><span>Flex</span></div>
                
                <div class="photo-nav">
                    <button onclick="document.getElementById('view-virtus').src='https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?q=80&w=800'">FORA</button>
                    <button onclick="document.getElementById('view-virtus').src='https://images.unsplash.com/photo-1619767886558-efdc259cde1a?q=80&w=800'">DENTRO</button>
                </div>
            </div>
            <div>
                <div class="price"><span>R$</span> 105.000</div>
                <a href="https://wa.me/5517997263334" class="btn-consultar">Consultar no WhatsApp</a>
            </div>
        </div>
    </div>

    <h2 style="text-align: center; color: var(--accent);">NOSSA LOJA EM JALES</h2>
    <div class="map-wrap">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3744.17!2d-50.5516!3d-20.2725!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjDCsDE2JzIxLjAiUyA1MMKwMzMnMDUuOCJX!5e0!3m2!1spt-BR!2sbr!4v1700000000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Car Veículos | Jales - SP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --red: #D0121A; --red-dark: #9A0D13; --black: #0A0A0A; --dark: #111111; --dark2: #1A1A1A; --gray: #2C2C2C; --silver: #9CA3AF; --white: #F9FAFB; }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Barlow', sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; }

  nav { position: fixed; top:0; left:0; right:0; z-index:100; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 70px; background: rgba(10,10,10,0.95); border-bottom: 1px solid rgba(208,18,26,0.3); backdrop-filter: blur(10px); }
  .nav-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; }
  .nav-logo span { color: var(--red); }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a { color: var(--silver); text-decoration: none; font-family: 'Barlow Condensed'; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; }

  #hero { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; padding: 120px 5% 40px; }
  .hero-badge { background: rgba(208,18,26,0.15); border: 1px solid var(--red); color: var(--red); padding: 0.3rem 0.8rem; font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; width: fit-content; margin-bottom: 1rem; }
  .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(3.2rem, 10vw, 6.5rem); font-weight: 900; line-height: 0.9; text-transform: uppercase; }
  .hero-title .red { color: var(--red); display: block; }
  .hero-title .italic { font-style: italic; font-weight: 300; display: block; }

  section { padding: 60px 5%; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
  .card { background: var(--dark2); border: 1px solid var(--gray); border-radius: 4px; overflow: hidden; transition: 0.3s; }
  .card-img { width: 100%; aspect-ratio: 4/3; background: #222; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-content { padding: 15px; }
  .price { color: var(--red); font-size: 1.5rem; font-weight: 900; font-family: 'Barlow Condensed'; margin: 10px 0; }
  .btn-consult { display: block; background: var(--red); color: white; text-align: center; padding: 10px; text-decoration: none; font-weight: 700; text-transform: uppercase; border-radius: 2px; font-size: 0.8rem; }

  /* CONTATO E MAPA (AJUSTADO PARA O PRINT) */
  .contato-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 20px; }
  .form-box { display: flex; flex-direction: column; }
  .form-box h2 { font-family: 'Barlow Condensed'; font-size: 2rem; text-transform: uppercase; margin-bottom: 20px; }
  .form-box input, .form-box textarea { background: #0c0c0c; border: 1px solid #1a1a1a; color: white; padding: 15px; margin-bottom: 10px; font-family: 'Barlow'; }
  .btn-enviar { background: var(--red); color: white; border: none; padding: 15px; font-weight: 700; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; }

  .map-box h2 { font-family: 'Barlow Condensed'; font-size: 2rem; text-transform: uppercase; margin-bottom: 20px; }
  .map-wrap { width: 100%; height: 400px; border: 1px solid var(--gray); }
  
  @media (max-width: 768px) { .contato-wrapper { grid-template-columns: 1fr; } }

  .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">Speed <span>Car</span></a>
</nav>

<section id="hero">
  <div class="hero-badge">JALES – SP · DESDE 2010</div>
  <h1 class="hero-title">
    <span>SEU PRÓXIMO</span>
    <span class="red">VEÍCULO</span>
    <span class="italic">ESTÁ AQUI.</span>
  </h1>
</section>

<section id="estoque">
  <div class="grid">
    <script>
      const tel = "5517997263334";
      const carros = [
        { n: "Chevrolet Tracker LTZ", p: "119.900", i: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?q=80&w=400" },
        { n: "Toyota Corolla XEi", p: "152.000", i: "https://images.unsplash.com/photo-1621007947382-bb3c3994e3fb?q=80&w=400" },
        { n: "Jeep Compass Longitude", p: "148.900", i: "https://images.unsplash.com/photo-1539101102904-74e14620e43b?q=80&w=400" },
        { n: "VW Virtus Highline", p: "92.500", i: "https://images.unsplash.com/photo-1541899481282-d53bffe3c15d?q=80&w=400" },
        { n: "Honda Civic Touring", p: "135.000", i: "https://images.unsplash.com/photo-1594502184342-2e12f877aa73?q=80&w=400" },
        { n: "Fiat Toro Ultra", p: "189.900", i: "https://images.unsplash.com/photo-1606016159991-fed45ac7bd8d?q=80&w=400" },
        { n: "Hyundai Creta Ultimate", p: "144.000", i: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?q=80&w=400" },
        { n: "Ford Ranger XLT", p: "215.000", i: "https://images.unsplash.com/photo-1533591380348-14193f1de18f?q=80&w=400" },
        { n: "Nissan Kicks Exclusive", p: "128.500", i: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?q=80&w=400" },
        { n: "BMW 320i M Sport", p: "245.000", i: "https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=400" }
      ];
      carros.forEach(c => {
        const msg = encodeURIComponent(`Olá! Vi o ${c.n} no site por R$ ${c.p} e gostaria de mais informações.`);
        document.write(`
          <div class="card">
            <div class="card-img"><img src="${c.i}"></div>
            <div class="card-content">
              <div style="font-family:'Barlow Condensed'; font-weight:700; text-transform:uppercase;">${c.n}</div>
              <div class="price">R$ ${c.p}</div>
              <a href="https://wa.me/${tel}?text=${msg}" class="btn-consult">Consultar</a>
            </div>
          </div>
        `);
      });
    </script>
  </div>
</section>

<section id="contato">
  <div class="contato-wrapper">
    <div class="form-box">
      <h2>FALE CONOSCO</h2>
      <input type="text" id="nome" placeholder="Seu Nome">
      <input type="tel" id="telefone" placeholder="Seu Telefone">
      <textarea id="mensagem" rows="4" placeholder="Como podemos ajudar?"></textarea>
      <button class="btn-enviar" onclick="enviarMensagem()">ENVIAR VIA WHATSAPP</button>
    </div>
    <div class="map-box">
      <h2>NOSSA LOJA</h2>
      <p style="margin-bottom: 10px; color: var(--silver);">Av. João Amadeu, 3216 – Jales/SP</p>
      <div class="map-wrap">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3744.1706680798154!2d-50.551792623910545!3d-20.272445981195325!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9499ad69919f55e5%3A0xc68e6f16f5c8680!2sAv.%20Jo%C3%A3o%20Amadeu%2C%203216%20-%20Jardim%20Samambaia%2C%20Jales%20-%20SP%2C%2015700-200!5e0!3m2!1spt-BR!2sbr!4v1713022134567!5m2!1spt-BR!2sbr" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </div>
  </div>
</section>

<a href="https://wa.me/5517997263334?text=Olá! Gostaria de falar com um consultor." class="whatsapp-float">
  <svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
</a>

<script>
  function enviarMensagem() {
    const nome = document.getElementById('nome').value;
    const tel_cliente = document.getElementById('telefone').value;
    const msg = document.getElementById('mensagem').value;
    const texto = encodeURIComponent(`Olá! Meu nome é ${nome}. Meu telefone é ${tel_cliente}. Mensagem: ${msg}`);
    window.open(`https://wa.me/5517997263334?text=${texto}`, '_blank');
  }
</script>

</body>
</html>
